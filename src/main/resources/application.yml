server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: smartgym-healthtrack

  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres-prueba.ctcqusoums7y.us-east-2.rds.amazonaws.com:5432/smartgym_db}
    username: postgres
    password: Q%jDhdFwaf3cFaq%HhMB
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: validate

    show-sql: ${SHOW_SQL:false}

    properties:
      hibernate:
        format_sql: ${FORMAT_SQL:false}
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:never}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE_SQL:INFO}