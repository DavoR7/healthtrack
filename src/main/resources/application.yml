server:
  port: 8080

spring:
  application:
    name: smartgym-healthtrack

  datasource:
    url: jdbc:postgresql://localhost:5432/smartgym_db
    username: antoniocajamarca
    password: ""
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    "[org.hibernate.SQL]": DEBUG